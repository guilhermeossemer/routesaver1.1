<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | RouteSaver Firebase</title>
  <link rel="stylesheet" href="./public/css/auth.css" />
  <link rel="manifest" href="./public/manifest.webmanifest" />
  <link rel="icon" type="image/png" sizes="64x64" href="./public/img/favicon-64.png" />
  <meta name="theme-color" content="#0b1220" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="RouteSaver" />
</head>

<body>
  <div class="auth-container">
    <div class="auth-card">
      <h1>Entrar</h1>
      <p>Acesse sua conta para visualizar suas rotas.</p>

      <form id="login-form" class="auth-form">
        <div class="form-group">
          <label for="login-email">E-mail</label>
          <input type="email" id="login-email" placeholder="Digite seu e-mail" required />
        </div>

        <div class="form-group">
          <label for="login-password">Senha</label>
          <input type="password" id="login-password" placeholder="Digite sua senha" required />
        </div>

        <button type="submit" class="btn-submit">Entrar</button>
      </form>

      <div class="auth-links">
        <a href="./public/pages/register.html">Criar conta</a>
      </div>
    </div>
  </div>

  <script type="module" src="./public/js/auth.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", async () => {
        try {
          const reg = await navigator.serviceWorker.register("./public/sw.js", {
            scope: "/routesaver-firebase/public/"
          });

          console.log("SW registrado:", reg.scope);
        } catch (err) {
          console.error("Erro ao registrar SW:", err);
        }
      });
    }
  </script>
</body>

</html>
