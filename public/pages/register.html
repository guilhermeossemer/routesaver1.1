<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cadastro | RouteSaver Firebase</title>
  <link rel="stylesheet" href="../css/auth.css" />
  <link rel="manifest" href="../../manifest.webmanifest" />
  <link rel="icon" type="image/png" sizes="64x64" href="../img/favicon-64.png" />
  <meta name="theme-color" content="#0b1220" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="RouteSaver" />
</head>

<body>
  <div class="auth-container">
    <div class="auth-card">
      <h1>Criar conta</h1>
      <p>Cadastre-se para começar a salvar suas rotas.</p>

      <form id="register-form" class="auth-form">
        <div class="form-group">
          <label for="register-name">Nome</label>
          <input type="text" id="register-name" placeholder="Digite seu nome" required />
        </div>

        <div class="form-group">
          <label for="register-email">E-mail</label>
          <input type="email" id="register-email" placeholder="Digite seu e-mail" required />
        </div>

        <div class="form-group">
          <label for="register-password">Senha</label>
          <input type="password" id="register-password" placeholder="Crie uma senha" required />
        </div>

        <button type="submit" class="btn-submit">Cadastrar</button>
      </form>

      <div class="auth-links">
        <a href="../../index.html">Já tenho conta</a>
      </div>
    </div>
  </div>

  <script type="module" src="../js/auth.js"></script>
</body>

</html>
